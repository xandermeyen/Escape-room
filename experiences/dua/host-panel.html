<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>D.U.A. - Host</title>

  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/svg+xml" href="../../assets/img/bureau_x_favicon.svg" />
  <link rel="stylesheet" href="../../shared/css/game.css" />

  <style>
    body { background: #1a1a1a; color: #e8e0d0; min-height: 100vh; padding: 2rem 1rem; }

    .admin-header {
      display: flex; align-items: center; gap: 1rem;
      border-bottom: 1px solid #444; padding-bottom: 1rem; margin-bottom: 2rem;
    }
    .admin-header img  { height: 28px; opacity: 0.8; }
    .admin-header h1   { font-family: 'Special Elite', serif; font-size: 1.4rem; margin: 0; color: #c9b99a; }
    .badge-admin {
      background: #2d4a3e; color: #8fc9a8; font-size: 0.65rem;
      padding: 2px 8px; border-radius: 3px; letter-spacing: 1px; text-transform: uppercase;
    }

    .kaart {
      background: #252525; border: 1px solid #3a3a3a; border-radius: 6px;
      padding: 1.5rem; margin-bottom: 1.5rem;
    }
    .kaart-titel {
      font-family: 'Special Elite', serif; font-size: 1rem;
      color: #c9b99a; margin-bottom: 1rem; letter-spacing: 0.5px;
    }

    .code-gegenereerd {
      font-family: monospace; font-size: 1.6rem; letter-spacing: 3px;
      color: #e8e0d0; background: #1a1a1a; border: 1px dashed #555;
      border-radius: 4px; padding: 0.6rem 1.2rem; display: inline-block;
      margin-bottom: 1rem;
    }

    .btn-admin {
      background: #2d4a3e; color: #e8e0d0; border: none;
      padding: 0.5rem 1.2rem; border-radius: 4px; font-size: 0.9rem; cursor: pointer;
      transition: background 0.2s;
    }
    .btn-admin:hover    { background: #3d6b5a; color: #fff; }
    .btn-admin:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-sec {
      background: transparent; color: #aaa; border: 1px solid #444;
      padding: 0.5rem 1.2rem; border-radius: 4px; font-size: 0.9rem; cursor: pointer;
    }
    .btn-sec:hover { border-color: #888; color: #e8e0d0; }

    .veld-label { color: #888; font-size: 0.8rem; margin-bottom: 0.3rem; display: block; }

    select.admin-select {
      background: #1a1a1a; border: 1px solid #444; color: #e8e0d0;
      border-radius: 4px; padding: 0.45rem 0.6rem;
      font-family: 'Special Elite', serif; font-size: 0.9rem; cursor: pointer;
    }
    select.admin-select:focus { outline: none; border-color: #2d4a3e; }

    .sessie-tabel { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .sessie-tabel th {
      text-align: left; color: #888; font-weight: normal; font-size: 0.75rem;
      text-transform: uppercase; letter-spacing: 1px; padding: 0 0.5rem 0.75rem;
      border-bottom: 1px solid #333;
    }
    .sessie-tabel td { padding: 0.7rem 0.5rem; border-bottom: 1px solid #2a2a2a; vertical-align: middle; }
    .sessie-tabel tr:last-child td { border-bottom: none; }
    .sessie-tabel tr:hover td { background: #2a2a2a; }

    .code-cel { font-family: monospace; font-size: 0.95rem; letter-spacing: 2px; color: #c9b99a; }

    .puzzel-bollen { display: flex; gap: 4px; align-items: center; }
    .bol { width: 14px; height: 14px; border-radius: 50%; border: 1px solid #444; }
    .bol.klaar { background: #4a7c4a; border-color: #4a7c4a; }
    .bol.open  { background: #2a2a2a; }

    .badge-actief   { background: #2a4a2a; color: #7dc47d; font-size: 0.7rem; padding: 2px 7px; border-radius: 3px; }
    .badge-klaar    { background: #4a3a00; color: #c9a84c; font-size: 0.7rem; padding: 2px 7px; border-radius: 3px; }
    .badge-bezig    { background: #2d4a3e; color: #8fc9a8; font-size: 0.7rem; padding: 2px 7px; border-radius: 3px; }
    .badge-inactief { background: #3a2a2a; color: #888;    font-size: 0.7rem; padding: 2px 7px; border-radius: 3px; }

    .kopieer-knop {
      background: none; border: none; color: #666; cursor: pointer; padding: 2px 6px;
      border-radius: 3px; transition: color 0.15s;
    }
    .kopieer-knop:hover { color: #c9b99a; }

    .link-input {
      background: #1a1a1a; border: 1px solid #333; color: #888;
      border-radius: 3px; padding: 2px 6px; font-family: monospace;
      font-size: 0.75rem; width: 230px; vertical-align: middle;
    }

    .status-bericht {
      padding: 0.6rem 1rem; border-radius: 4px; font-size: 0.85rem; margin-top: 1rem; display: none;
    }
    .status-ok   { background: #2a4a2a; color: #7dc47d; }
    .status-fout { background: #4a2a2a; color: #c47d7d; }

    .laden       { color: #666; font-size: 0.85rem; }
    .geen-sessies { color: #555; font-size: 0.85rem; text-align: center; padding: 2rem; }

    .terug-link { color: #666; font-size: 0.8rem; text-decoration: none; transition: color 0.2s; }
    .terug-link:hover { color: #c9b99a; }

    .spelers-info {
      display: inline-flex; gap: 4px; align-items: center;
      font-size: 0.75rem; color: #666;
    }
    .era-dot {
      width: 8px; height: 8px; border-radius: 50%; display: inline-block;
    }
    .era-1934 { background: #8b6914; }
    .era-2034 { background: #2d4a3e; }
  </style>
</head>
<body>

  <!-- ── Loginscherm ── -->
  <div id="login-scherm" style="
    position:fixed; inset:0; background:#1a1a1a;
    display:flex; align-items:center; justify-content:center; z-index:9999;">
    <div style="text-align:center; color:#e8e0d0; font-family:'Special Elite',serif; width:280px;">
      <div style="font-size:1.1rem; letter-spacing:0.1em; margin-bottom:0.4rem; color:#c9b99a;">
        Bureau X · Host-toegang
      </div>
      <div style="font-size:0.8rem; color:#666; margin-bottom:1.5rem; letter-spacing:0.05em;">
        D.U.A.
      </div>
      <input id="email-invoer" type="email" placeholder="E-mailadres"
        style="background:#252525; border:1px solid #444; color:#e8e0d0;
               padding:0.6rem 1rem; border-radius:4px; font-size:1rem;
               outline:none; width:100%; margin-bottom:0.75rem; box-sizing:border-box;"
        onkeydown="if(event.key==='Enter') login()" />
      <input id="ww-invoer" type="password" placeholder="Wachtwoord"
        style="background:#252525; border:1px solid #444; color:#e8e0d0;
               padding:0.6rem 1rem; border-radius:4px; font-size:1rem;
               outline:none; width:100%; box-sizing:border-box;"
        onkeydown="if(event.key==='Enter') login()" />
      <br><br>
      <button id="login-knop" onclick="login()"
        style="background:#2d4a3e; color:#fff; border:none;
               padding:0.5rem 1.5rem; border-radius:4px; cursor:pointer;
               font-family:'Special Elite',serif; font-size:0.9rem; letter-spacing:0.05em; width:100%;">
        Inloggen
      </button>
      <div id="login-fout" style="color:#c47d7d; margin-top:1rem; font-size:0.85rem; display:none;">
        Ongeldig e-mailadres of wachtwoord.
      </div>
      <div style="margin-top:1.5rem;">
        <a href="../../index.html" class="terug-link">
          <i class="bi bi-arrow-left me-1"></i>Terug naar home
        </a>
      </div>
    </div>
  </div>


  <!-- ── Admin-inhoud ── -->
  <div id="admin-inhoud" style="display:none;">
    <div style="max-width: 860px; margin: 0 auto;">

      <!-- Header -->
      <div class="admin-header">
        <img src="../../assets/img/bureau_x_logo_dark.svg" alt="Bureau X" />
        <h1>D.U.A.</h1>
        <span class="badge-admin">Host</span>
        <a href="../../index.html" class="btn-sec ms-auto me-2" style="font-size:0.8rem; text-decoration:none;">
          <i class="bi bi-house me-1"></i>Home
        </a>
        <button onclick="window.uitloggen()" class="btn-sec" style="font-size:0.8rem;">
          <i class="bi bi-box-arrow-right me-1"></i>Uitloggen
        </button>
      </div>

      <!-- Nieuwe sessie aanmaken -->
      <div class="kaart">
        <div class="kaart-titel"><i class="bi bi-plus-circle me-2"></i>Nieuwe sessie aanmaken</div>

        <div class="mb-3">
          <div class="code-gegenereerd" id="volgende-code">
            <span style="color:#555;">Laden…</span>
          </div>
        </div>

        <div class="d-flex align-items-center gap-3 mb-3" style="flex-wrap:wrap;">
          <div>
            <label class="veld-label">Aantal spelers</label>
            <select id="select-spelers" class="admin-select">
              <option value="2">2 spelers</option>
              <option value="3">3 spelers</option>
              <option value="4" selected>4 spelers</option>
            </select>
          </div>
        </div>

        <button class="btn-admin" id="btn-aanmaken" onclick="maakSessieAan()">
          <i class="bi bi-database-add me-2"></i>Sessie aanmaken
        </button>

        <div class="status-bericht" id="status-aanmaken"></div>
      </div>

      <!-- Sessie-overzicht -->
      <div class="kaart">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <div class="kaart-titel mb-0"><i class="bi bi-list-ul me-2"></i>Sessie-overzicht</div>
          <button class="btn-sec" style="font-size:0.8rem; padding:3px 10px;" onclick="laadLijst()">
            <i class="bi bi-arrow-clockwise me-1"></i>Verversen
          </button>
        </div>

        <div class="laden" id="laden-label">Laden…</div>

        <table class="sessie-tabel" id="sessie-tabel" style="display:none;">
          <thead>
            <tr>
              <th>Code</th>
              <th>Aangemaakt</th>
              <th>Spelers</th>
              <th>Puzzels</th>
              <th>Status</th>
              <th>Lobby-link</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="sessie-tbody"></tbody>
        </table>

        <div class="geen-sessies" id="geen-sessies" style="display:none;">
          Nog geen D.U.A.-sessies aangemaakt.
        </div>
      </div>

    </div>
  </div><!-- /admin-inhoud -->


  <script type="module" src="./js/host-panel.ts"></script>
  <script type="module" src="/src/bootstrap.ts"></script>
</body>
</html>
