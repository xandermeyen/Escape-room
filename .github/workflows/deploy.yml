name: Deploy naar GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: pnpm installeren
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Node.js instellen
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Productie .env aanmaken vanuit secrets
        run: |
          cat > .env << EOF
          VITE_FIREBASE_API_KEY=${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN=${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_DATABASE_URL=${{ secrets.VITE_FIREBASE_DATABASE_URL }}
          VITE_FIREBASE_PROJECT_ID=${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET=${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID=${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_SENTRY_DSN=${{ secrets.VITE_SENTRY_DSN }}
          EOF

      - name: Dependencies installeren
        run: pnpm install

      - name: Linten
        run: pnpm lint

      - name: Tests draaien
        run: pnpm test

      - name: Bouwen
        run: pnpm build

      - name: Pages artifact uploaden
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deployen naar GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
