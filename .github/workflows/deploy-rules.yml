name: Firebase rules deployen

# Aparte, handmatige workflow. Draait NIET automatisch bij een push naar main.
# Je start hem bewust via de "Run workflow"-knop (Actions-tab) zodat je nooit per
# ongeluk je live database-rules overschrijft.
#
# Vereiste repository-secrets:
#   FIREBASE_SERVICE_ACCOUNT  -> de volledige service-account JSON (Firebase-console
#                                > Projectinstellingen > Service accounts > Genereer
#                                nieuwe privésleutel). Plak de hele inhoud als secret.
#   VITE_FIREBASE_PROJECT_ID  -> bestaat al (wordt ook door de build gebruikt)
#
# Authenticatie gebeurt via GOOGLE_APPLICATION_CREDENTIALS (service-account),
# de aanbevolen manier. De oude --token methode is in firebase-tools v14 verwijderd.

on:
  workflow_dispatch:

jobs:
  deploy-rules:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js instellen
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Rules deployen naar Firebase
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/firebase-sa.json
        run: |
          printf '%s' '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > "$GOOGLE_APPLICATION_CREDENTIALS"
          npx --yes firebase-tools@latest deploy \
            --only database \
            --project ${{ secrets.VITE_FIREBASE_PROJECT_ID }} \
            --non-interactive
          rm -f "$GOOGLE_APPLICATION_CREDENTIALS"
