<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kamer 14 — Admin</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/svg+xml" href="../assets/img/bureau_x_favicon.svg" />
  <link rel="stylesheet" href="css/game.css" />

  <style>
    body { background: #1a1a1a; color: #e8e0d0; min-height: 100vh; padding: 2rem 1rem; }

    .admin-header {
      display: flex; align-items: center; gap: 1rem;
      border-bottom: 1px solid #444; padding-bottom: 1rem; margin-bottom: 2rem;
    }
    .admin-header img { height: 28px; opacity: 0.8; }
    .admin-header h1 { font-family: 'Special Elite', serif; font-size: 1.4rem; margin: 0; color: #c9b99a; }
    .badge-admin {
      background: #8b3a3a; color: #fff; font-size: 0.65rem;
      padding: 2px 8px; border-radius: 3px; letter-spacing: 1px; text-transform: uppercase;
    }

    .kaart {
      background: #252525; border: 1px solid #3a3a3a; border-radius: 6px;
      padding: 1.5rem; margin-bottom: 1.5rem;
    }
    .kaart-titel {
      font-family: 'Special Elite', serif; font-size: 1rem;
      color: #c9b99a; margin-bottom: 1rem; letter-spacing: 0.5px;
    }

    .code-gegenereerd {
      font-family: monospace; font-size: 1.8rem; letter-spacing: 4px;
      color: #e8e0d0; background: #1a1a1a; border: 1px dashed #555;
      border-radius: 4px; padding: 0.75rem 1.5rem; display: inline-block;
      margin-bottom: 1rem;
    }

    .btn-admin {
      background: #8b3a3a; color: #fff; border: none;
      padding: 0.5rem 1.2rem; border-radius: 4px; font-size: 0.9rem; cursor: pointer;
      transition: background 0.2s;
    }
    .btn-admin:hover { background: #a04040; color: #fff; }
    .btn-admin:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-sec {
      background: transparent; color: #aaa; border: 1px solid #444;
      padding: 0.5rem 1.2rem; border-radius: 4px; font-size: 0.9rem; cursor: pointer;
    }
    .btn-sec:hover { border-color: #888; color: #e8e0d0; }

    .sessie-tabel { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .sessie-tabel th {
      text-align: left; color: #888; font-weight: normal; font-size: 0.75rem;
      text-transform: uppercase; letter-spacing: 1px; padding: 0 0.5rem 0.75rem;
      border-bottom: 1px solid #333;
    }
    .sessie-tabel td { padding: 0.7rem 0.5rem; border-bottom: 1px solid #2a2a2a; vertical-align: middle; }
    .sessie-tabel tr:last-child td { border-bottom: none; }
    .sessie-tabel tr:hover td { background: #2a2a2a; }

    .code-cel { font-family: monospace; font-size: 1rem; letter-spacing: 2px; color: #c9b99a; }

    .puzzel-bollen { display: flex; gap: 4px; align-items: center; }
    .bol { width: 14px; height: 14px; border-radius: 50%; border: 1px solid #444; }
    .bol.klaar { background: #4a7c4a; border-color: #4a7c4a; }
    .bol.open  { background: #2a2a2a; }

    .badge-actief   { background: #2a4a2a; color: #7dc47d; font-size: 0.7rem; padding: 2px 7px; border-radius: 3px; }
    .badge-klaar    { background: #4a3a00; color: #c9a84c; font-size: 0.7rem; padding: 2px 7px; border-radius: 3px; }
    .badge-inactief { background: #3a2a2a; color: #888;    font-size: 0.7rem; padding: 2px 7px; border-radius: 3px; }

    .kopieer-knop {
      background: none; border: none; color: #666; cursor: pointer; padding: 2px 6px;
      border-radius: 3px; transition: color 0.15s;
    }
    .kopieer-knop:hover { color: #c9b99a; }

    .status-bericht {
      padding: 0.6rem 1rem; border-radius: 4px; font-size: 0.85rem; margin-top: 1rem; display: none;
    }
    .status-ok   { background: #2a4a2a; color: #7dc47d; }
    .status-fout { background: #4a2a2a; color: #c47d7d; }

    .code-invoer-admin {
      background: #1a1a1a; border: 1px solid #444; color: #e8e0d0;
      border-radius: 4px; padding: 0.5rem 0.75rem; font-family: monospace;
      font-size: 1rem; letter-spacing: 2px; width: 180px; text-transform: uppercase;
    }
    .code-invoer-admin:focus { outline: none; border-color: #8b3a3a; }

    .laden { color: #666; font-size: 0.85rem; }
    .geen-sessies { color: #555; font-size: 0.85rem; text-align: center; padding: 2rem; }
  </style>
</head>
<body>

  <div style="max-width: 780px; margin: 0 auto;">

    <!-- Header -->
    <div class="admin-header">
      <img src="../assets/img/bureau_x_logo_dark.svg" alt="Bureau X" />
      <h1>Kamer 14</h1>
      <span class="badge-admin">Admin</span>
    </div>

    <!-- Nieuwe sessie aanmaken -->
    <div class="kaart">
      <div class="kaart-titel"><i class="bi bi-plus-circle me-2"></i>Nieuwe sessie aanmaken</div>

      <div class="mb-3">
        <div class="code-gegenereerd" id="gegenereerde-code">——</div>
        <button class="btn-sec ms-2" onclick="genereerCode()">
          <i class="bi bi-arrow-clockwise me-1"></i>Andere code
        </button>
      </div>

      <div class="d-flex align-items-center gap-2 mb-2">
        <span style="color:#888; font-size:0.85rem;">Of voer zelf een code in:</span>
        <input type="text" id="eigen-code" class="code-invoer-admin" placeholder="bv. TEST01" maxlength="20" />
      </div>

      <button class="btn-admin mt-2" id="btn-aanmaken" onclick="maakSessieAan()">
        <i class="bi bi-check2 me-2"></i>Sessie aanmaken
      </button>

      <div class="status-bericht" id="status-aanmaken"></div>
    </div>

    <!-- Sessie-overzicht -->
    <div class="kaart">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <div class="kaart-titel mb-0"><i class="bi bi-list-ul me-2"></i>Sessie-overzicht</div>
        <button class="btn-sec" style="font-size:0.8rem; padding:3px 10px;" onclick="verversLijst()">
          <i class="bi bi-arrow-clockwise me-1"></i>Verversen
        </button>
      </div>

      <div class="laden" id="laden-label">Laden…</div>

      <table class="sessie-tabel" id="sessie-tabel" style="display:none;">
        <thead>
          <tr>
            <th>Code</th>
            <th>Puzzels</th>
            <th>Rapport</th>
            <th>Status</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="sessie-tbody"></tbody>
      </table>

      <div class="geen-sessies" id="geen-sessies" style="display:none;">
        Nog geen sessies aangemaakt op dit apparaat.
      </div>
    </div>

  </div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getDatabase, ref, set, get, update }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  const firebaseConfig = {
    apiKey:            "AIzaSyA7HtoKiFqWnopUXOAo4Niz-s17vtihT1Y",
    authDomain:        "bureau-x.firebaseapp.com",
    databaseURL:       "https://bureau-x-default-rtdb.europe-west1.firebasedatabase.app",
    projectId:         "bureau-x",
    storageBucket:     "bureau-x.firebasestorage.app",
    messagingSenderId: "63256799402",
    appId:             "1:63256799402:web:adfb38bdc32707270888d3",
  };

  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);

  // ── Lokale opslag van aangemaakte codes ───────────────────
  const STORAGE_KEY = 'kamer14_admin_sessies';

  function getSessies() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
    catch { return []; }
  }

  function saveSessie(code) {
    const lijst = getSessies();
    if (!lijst.includes(code)) {
      lijst.unshift(code);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(lijst));
    }
  }

  function verwijderLokaal(code) {
    const lijst = getSessies().filter(c => c !== code);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(lijst));
  }

  // ── Code genereren ────────────────────────────────────────
  function nieuweCode() {
    const letters = 'ABCDEFGHJKLMNPQRSTUVWXYZ';
    const cijfers  = '23456789';
    const deel1 = Array.from({length: 3}, () => letters[Math.floor(Math.random() * letters.length)]).join('');
    const deel2 = Array.from({length: 3}, () => cijfers[Math.floor(Math.random() * cijfers.length)]).join('');
    return `${deel1}-${deel2}`;
  }

  window.genereerCode = function() {
    document.getElementById('gegenereerde-code').textContent = nieuweCode();
    document.getElementById('eigen-code').value = '';
  };

  // ── Sessie aanmaken ───────────────────────────────────────
  window.maakSessieAan = async function() {
    const eigenCode = document.getElementById('eigen-code').value.trim().toUpperCase();
    const code      = eigenCode || document.getElementById('gegenereerde-code').textContent;
    const status    = document.getElementById('status-aanmaken');
    const btn       = document.getElementById('btn-aanmaken');

    if (!code || code === '——') {
      toonStatus(status, 'Genereer eerst een code.', false); return;
    }
    if (!/^[A-Z0-9\-]{3,20}$/.test(code)) {
      toonStatus(status, 'Ongeldige code — gebruik enkel letters, cijfers en koppeltekens.', false); return;
    }

    btn.disabled = true;
    btn.innerHTML = '<i class="bi bi-hourglass-split me-2"></i>Aanmaken…';

    try {
      const snap = await get(ref(db, `sessions/${code}`));
      if (snap.exists()) {
        toonStatus(status, `Code "${code}" bestaat al. Kies een andere.`, false);
        return;
      }

      await set(ref(db, `sessions/${code}`), {
        aangemaakt: Date.now(),
        actief: true,
        puzzels: { p1: false, p2: false, p3: false, p4: false, p5: false },
        rapport:  { ingediend: false, inhoud: {} },
      });

      saveSessie(code);
      toonStatus(status, `✓ Sessie "${code}" aangemaakt!`, true);
      genereerCode();
      laadLijst();

    } catch (err) {
      console.error(err);
      toonStatus(status, 'Firebase-fout: ' + err.message, false);
    } finally {
      btn.disabled = false;
      btn.innerHTML = '<i class="bi bi-check2 me-2"></i>Sessie aanmaken';
    }
  };

  // ── Sessie-overzicht laden ────────────────────────────────
  async function laadLijst() {
    const laden   = document.getElementById('laden-label');
    const tabel   = document.getElementById('sessie-tabel');
    const geenMsg = document.getElementById('geen-sessies');
    const tbody   = document.getElementById('sessie-tbody');
    const codes   = getSessies();

    laden.style.display  = 'block';
    tabel.style.display  = 'none';
    geenMsg.style.display = 'none';

    if (codes.length === 0) {
      laden.style.display   = 'none';
      geenMsg.style.display = 'block';
      return;
    }

    const resultaten = await Promise.all(codes.map(async code => {
      try {
        const snap = await get(ref(db, `sessions/${code}`));
        return { code, data: snap.exists() ? snap.val() : null };
      } catch {
        return { code, data: null };
      }
    }));

    laden.style.display = 'none';
    tabel.style.display = 'table';

    tbody.innerHTML = resultaten.map(({ code, data }) => {
      if (!data) {
        return `<tr>
          <td class="code-cel">${code}</td>
          <td colspan="3" style="color:#555; font-size:0.8rem;">Niet gevonden in Firebase</td>
          <td>
            <button class="kopieer-knop" title="Verwijder uit lijst" onclick="verwijderUitLijst('${code}')">
              <i class="bi bi-x-circle"></i>
            </button>
          </td>
        </tr>`;
      }

      const p = data.puzzels || {};
      const bollen = [p.p1, p.p2, p.p3, p.p4, p.p5]
        .map(v => `<div class="bol ${v ? 'klaar' : 'open'}"></div>`)
        .join('');
      const aantalKlaar = [p.p1, p.p2, p.p3, p.p4, p.p5].filter(Boolean).length;

      const rapportBadge = data.rapport?.ingediend
        ? '<span class="badge-klaar"><i class="bi bi-check2 me-1"></i>Ingediend</span>'
        : '<span style="color:#555; font-size:0.8rem;">—</span>';

      let statusBadge;
      if (!data.actief) {
        statusBadge = '<span class="badge-inactief">Inactief</span>';
      } else if (aantalKlaar === 5) {
        statusBadge = '<span class="badge-klaar">Voltooid</span>';
      } else {
        statusBadge = '<span class="badge-actief">Actief</span>';
      }

      return `<tr>
        <td class="code-cel">
          ${code}
          <button class="kopieer-knop" title="Kopieer" onclick="kopieer('${code}')">
            <i class="bi bi-copy"></i>
          </button>
        </td>
        <td>
          <div class="puzzel-bollen">${bollen}</div>
          <span style="color:#666; font-size:0.75rem;">${aantalKlaar}/5</span>
        </td>
        <td>${rapportBadge}</td>
        <td>${statusBadge}</td>
        <td>
          <button class="kopieer-knop" title="Deactiveer" onclick="deactiveer('${code}')" style="color:#555;">
            <i class="bi bi-x-circle"></i>
          </button>
        </td>
      </tr>`;
    }).join('');
  }

  window.verversLijst = laadLijst;

  // ── Helpers ───────────────────────────────────────────────
  window.kopieer = function(code) {
    navigator.clipboard?.writeText(code).then(() => {
      toonStatus(document.getElementById('status-aanmaken'), `Code "${code}" gekopieerd!`, true);
    });
  };

  window.deactiveer = async function(code) {
    if (!confirm(`Sessie "${code}" deactiveren?`)) return;
    try {
      await update(ref(db, `sessions/${code}`), { actief: false });
      laadLijst();
    } catch (err) {
      alert('Fout bij deactiveren: ' + err.message);
    }
  };

  window.verwijderUitLijst = function(code) {
    verwijderLokaal(code);
    laadLijst();
  };

  function toonStatus(el, tekst, ok) {
    el.textContent = tekst;
    el.className   = `status-bericht ${ok ? 'status-ok' : 'status-fout'}`;
    el.style.display = 'block';
    if (ok) setTimeout(() => { el.style.display = 'none'; }, 4000);
  }

  // ── Init ──────────────────────────────────────────────────
  genereerCode();
  laadLijst();
</script>

</body>
</html>
